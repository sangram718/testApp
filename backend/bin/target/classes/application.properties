spring.application.name=auth-backend

# Server Configuration
server.port=8080

# Database Configuration (MariaDB)
spring.datasource.url=jdbc:mariadb://localhost:3306/auth_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# JWT Configuration
# 256-bit secret key for HMAC-SHA256
app.jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
# Expiration time in milliseconds (e.g., 24 hours = 86400000)
app.jwt.expiration=86400000
